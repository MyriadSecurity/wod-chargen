<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WoD Character Generator</title>
  <script>
    // PyScript requires a secure context (crypto.randomUUID). Custom domains may
    // serve HTTP unless GitHub Pages enforces HTTPS — redirect before boot.
    (function () {
      var host = location.hostname;
      if (
        location.protocol === "http:" &&
        host !== "localhost" &&
        host !== "127.0.0.1"
      ) {
        location.replace(location.href.replace(/^http:/, "https:"));
        return;
      }
      if (typeof crypto !== "undefined" && !crypto.randomUUID) {
        crypto.randomUUID = function () {
          return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, function (c) {
            var r = (Math.random() * 16) | 0;
            var v = c === "x" ? r : (r & 0x3) | 0x8;
            return v.toString(16);
          });
        };
      }
    })();
  </script>
  <link rel="icon" href="static/img/dark-pack-logo.svg" type="image/svg+xml" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            blood: '#8b1538',
            void: '#0d0d0f',
            ash: '#1a1a22',
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="static/theme.css" />
  <link rel="stylesheet" href="https://pyscript.net/releases/2024.11.1/core.css" />
